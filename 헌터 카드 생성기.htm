<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>\(@^0^@)/</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif;
      color: #17364d;
      background:
        radial-gradient(circle at 20% 10%, rgba(143, 194, 223, 0.42), transparent 32%),
        radial-gradient(circle at 80% 0%, rgba(246, 251, 255, 0.9), transparent 28%),
        linear-gradient(135deg, #eef8ff 0%, #ffffff 52%, #e7f4fb 100%);
      padding: 32px 16px;
    }

    .page {
      width: min(100%, 1040px);
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 420px;
      gap: 22px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid #c5deee;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 16px 34px rgba(35, 90, 130, 0.12);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: -0.8px;
    }

    .sub {
      margin: 0 0 22px;
      color: #5a89a5;
      font-size: 14px;
      line-height: 1.55;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 800;
      color: #5a89a5;
      letter-spacing: 0.4px;
      margin-bottom: 7px;
    }

    input, select {
      width: 100%;
      border: 1px solid #b9d8ea;
      background: #ffffff;
      color: #17364d;
      border-radius: 14px;
      padding: 12px 13px;
      font: inherit;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }

    input:focus, select:focus {
      border-color: #2f82b7;
      box-shadow: 0 0 0 4px rgba(47, 130, 183, 0.12);
    }

    .full { grid-column: 1 / -1; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      background: #2f82b7;
      color: white;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 18px rgba(47, 130, 183, 0.22);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.55; cursor: wait; }

    button.secondary {
      background: #ffffff;
      color: #2f82b7;
      border: 1px solid #b9d8ea;
      box-shadow: none;
    }

    .preview-wrap {
      position: sticky;
      top: 20px;
    }

    .preview-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      color: #5a89a5;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.4px;
    }

    .card-shell {
      width: 360px;
      margin: 0 auto;
      padding: 16px 10px;
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', Arial, sans-serif;
      color: var(--text, #17364d);
      line-height: 1.35;
    }

    .ghost-card {
      background: var(--card-bg, #f6fbff);
      border: 1px solid var(--line, #b9d8ea);
      border-radius: 20px;
      padding: 12px;
      margin-bottom: 16px;
      box-shadow: 0 8px 18px rgba(35,90,130,0.10);
      overflow: hidden;
    }

    .top-text {
      text-align: right;
      font-size: 10px;
      font-weight: bold;
      color: var(--muted, #5a89a5);
      letter-spacing: 0.2px;
      margin-bottom: 6px;
    }

    .divider {
      height: 2px;
      background: var(--soft-line, #c5deee);
      border-radius: 999px;
      margin-bottom: 10px;
    }

    .main-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .photo-box {
      flex: 0 0 auto;
      width: 112px;
      height: 154px;
      background: #ffffff;
      border: 1px solid var(--soft-line, #c5deee);
      border-radius: 15px;
      padding: 6px;
      box-shadow: 0 5px 12px rgba(35,90,130,0.07);
      overflow: hidden;
    }

    .photo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      border-radius: 10px;
      display: block;
      background: #ffffff;
    }

    .info-side {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top-info {
      display: flex;
      gap: 7px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .name-area {
      flex: 1 1 42%;
      min-width: 0;
    }

    .label-small {
      font-size: 8px;
      color: var(--label, #7fa9be);
      font-weight: bold;
      letter-spacing: 0.8px;
      margin-bottom: 2px;
    }

    .name-value {
      font-size: 17px;
      line-height: 1.1;
      font-weight: bold;
      color: var(--text, #17364d);
      letter-spacing: -0.4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hunter-area {
      flex: 0 0 auto;
      max-width: 58%;
      min-width: 0;
      text-align: right;
    }

    .hunter-pill {
      display: block;
      background: #ffffff;
      border: 1px solid var(--soft-line, #c5deee);
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 8px;
      line-height: 1.1;
      font-weight: bold;
      color: var(--pill-text, #376f93);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
    }

    .aff-row {
      display: flex;
      gap: 7px;
      align-items: center;
      margin-bottom: 8px;
    }

    .aff-box {
      flex: 1 1 auto;
      min-width: 0;
      background: #ffffff;
      border: 1px solid var(--soft-line, #c5deee);
      border-radius: 13px;
      padding: 7px 8px;
    }

    .aff-value {
      font-size: 13px;
      line-height: 1.15;
      font-weight: bold;
      color: var(--aff-text, #245b7b);
      letter-spacing: -0.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rank-badge {
      flex: 0 0 32px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent, #2f82b7);
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      line-height: 1;
      font-weight: bold;
      box-shadow: 0 4px 9px rgba(47,130,183,0.18);
    }

    .valid {
      text-align: right;
      font-size: 10px;
      font-weight: bold;
      color: var(--muted, #5a89a5);
      margin-bottom: 4px;
    }

    .barcode {
      height: 18px;
      border-radius: 6px;
      background: repeating-linear-gradient(90deg, var(--accent, #2f82b7) 0px, var(--accent, #2f82b7) 2px, #ffffff 2px, #ffffff 5px, var(--barcode-soft, #8fc2df) 5px, var(--barcode-soft, #8fc2df) 7px, #ffffff 7px, #ffffff 10px);
      border: 1px solid var(--soft-line, #c5deee);
      opacity: 0.82;
    }

    .bottom-note {
      background: #ffffff;
      border: 1px solid var(--soft-line, #c5deee);
      border-radius: 13px;
      padding: 6px 9px;
      margin-top: 10px;
    }

    .bottom-note div {
      font-size: 10px;
      color: var(--muted, #5a89a5);
      font-weight: bold;
      letter-spacing: 0.1px;
      word-break: keep-all;
    }

    .toast {
      min-height: 20px;
      margin-top: 12px;
      color: #2f82b7;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.45;
    }

    .tip {
      margin-top: 10px;
      color: #6b93aa;
      font-size: 12px;
      line-height: 1.45;
    }

    .mosaic {
      display: inline-block;
      vertical-align: -1px;
      border-radius: 3px;
      background: repeating-linear-gradient(90deg,#050608 0px,#050608 8px,#2b3038 8px,#2b3038 15px,#111318 15px,#111318 23px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.10);
    }

    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; }
      .preview-wrap { position: static; }
    }

    @media (max-width: 520px) {
      body { padding: 18px 10px; }
      .panel { padding: 16px; }
      .form-grid { grid-template-columns: 1fr; }
      h1 { font-size: 24px; }
      .card-shell { transform: scale(0.92); transform-origin: top center; margin-bottom: -28px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1>고스트 헌터 등록 카드 생성기</h1>
      <br>
      <div class="form-grid">
        <div>
          <label for="name">이름</label>
          <input id="name" value="린 블레어" />
        </div>

        <div>
          <label for="hunterNo">헌터 번호</label>
          <input id="hunterNo" value="LB-1031C-777" />
        </div>

        <div class="full">
          <label for="affiliation">소속</label>
          <input id="affiliation" value="고스트 헌터 사무소 문릿" />
        </div>

        <div>
          <label for="rank">등급</label>
          <input id="rank" value="A" maxlength="2" />
        </div>

        <div>
          <label for="theme">구분</label>
          <select id="theme">
            <option value="blue">개인 헌터</option>
            <option value="pink">정부 헌터</option>
            <option value="illegal">불법 헌터</option>
            <option value="green">미스트 가든</option>
            <option value="purple">블랙배럴 시큐리티</option>
            <option value="blacklist">블랙리스트 헌터</option>
          </select>
        </div>

        <div class="full">
          <label for="photoFile">사진</label>
          <input id="photoFile" type="file" accept="image/*" />
        </div>
      </div>

      <div class="actions">
        <button type="button" id="saveBtn">저장하기</button>
        <button type="button" class="secondary" id="resetBtn">처음 값으로</button>
      </div>

      <p class="toast" id="toast"></p>
    </section>

    <aside class="panel preview-wrap">
      <div class="preview-title">
        <span>\(@^0^@)/</span>
      </div>
      <div id="captureArea">
        <div id="card" class="card-shell"></div>
      </div>
    </aside>
  </main>

  <script>
    const fields = {
      name: document.querySelector('#name'),
      hunterNo: document.querySelector('#hunterNo'),
      affiliation: document.querySelector('#affiliation'),
      rank: document.querySelector('#rank'),
      photoFile: document.querySelector('#photoFile'),
      theme: document.querySelector('#theme')
    };

    const card = document.querySelector('#card');
    const toast = document.querySelector('#toast');
    const saveBtn = document.querySelector('#saveBtn');

    let uploadedPhoto = '';
    const placeholderPhoto = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" viewBox="0 0 300 300"><rect width="300" height="300" fill="%23e5f1f8"/><circle cx="150" cy="116" r="46" fill="%235a89a5" opacity="0.55"/><path d="M72 248c14-53 52-82 78-82s64 29 78 82" fill="%235a89a5" opacity="0.55"/><text x="150" y="276" text-anchor="middle" font-family="Arial" font-size="24" fill="%235a89a5">PHOTO</text></svg>')}`;

    const fixedText = {
      headquarters: 'Ghost Management Headquarters',
      valid: 'Valid by GMH',
      note: 'Phantom Bay Registered Ghost Hunter'
    };

    const themes = {
      blue: { cardBg: '#f6fbff', line: '#b9d8ea', softLine: '#c5deee', muted: '#5a89a5', accent: '#2f82b7', text: '#17364d', label: '#7fa9be', pillText: '#376f93', affText: '#245b7b', barcodeSoft: '#8fc2df' },
      pink: { cardBg: '#fff7fb', line: '#edbfd3', softLine: '#f2cadb', muted: '#a35d7a', accent: '#d15f91', text: '#5b243d', label: '#c17a99', pillText: '#9f416b', affText: '#7d2f52', barcodeSoft: '#f0a9c6' },
      green: { cardBg: '#f5fff9', line: '#b7dfc6', softLine: '#c8e9d4', muted: '#5b9870', accent: '#3c9b63', text: '#1c4c31', label: '#76ad89', pillText: '#2f7d4f', affText: '#25623e', barcodeSoft: '#9bd4ae' },
      purple: { cardBg: '#faf7ff', line: '#d6c2ef', softLine: '#dfcdf4', muted: '#7c67a6', accent: '#7356b6', text: '#392862', label: '#967dc2', pillText: '#60449f', affText: '#4d367f', barcodeSoft: '#bba4df' },
      illegal: { cardBg: '#111318', line: '#343943', softLine: '#4b5563', muted: '#a7b0be', accent: '#050608', text: '#f5f7fa', label: '#c0c7d2', pillText: '#e6e9ee', affText: '#f0f2f5', barcodeSoft: '#6b7280' },
      blacklist: { cardBg: '#fff5f5', line: '#d28c8c', softLine: '#e5aaaa', muted: '#8f3232', accent: '#1f1f24', text: '#2a1010', label: '#b65353', pillText: '#7f1d1d', affText: '#5f1515', barcodeSoft: '#b91c1c' }
    };

    const initialValues = {
      name: fields.name.value,
      hunterNo: fields.hunterNo.value,
      affiliation: fields.affiliation.value,
      rank: fields.rank.value,
      theme: fields.theme.value
    };

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function getValues() {
      return {
        name: fields.name.value.trim(),
        hunterNo: fields.hunterNo.value.trim(),
        affiliation: fields.affiliation.value.trim(),
        rank: fields.rank.value.trim(),
        photo: uploadedPhoto || placeholderPhoto,
        theme: fields.theme.value
      };
    }

    function mosaicBar(width, height = 10, align = 'left') {
      const margin = align === 'center' ? '0 auto' : align === 'right' ? '0 0 0 auto' : '0';
      return `<span class="mosaic" style="height:${height}px; width:${width}px; max-width:100%; margin:${margin};"></span>`;
    }

    function render() {
      const v = getValues();
      const theme = themes[v.theme] || themes.blue;
      const isIllegal = v.theme === 'illegal';

      const hunterNoDisplay = isIllegal ? mosaicBar(86, 10, 'center') : escapeHtml(v.hunterNo || 'NO-0000');
      const affiliationDisplay = isIllegal ? mosaicBar(148, 13) : escapeHtml(v.affiliation || '');
      const headquartersDisplay = isIllegal ? mosaicBar(178, 10, 'right') : fixedText.headquarters;
      const validDisplay = isIllegal ? `Valid by ${mosaicBar(30, 9)}` : fixedText.valid;
      const noteDisplay = isIllegal
        ? `${mosaicBar(132, 10)} Ghost Hunter`
        : v.theme === 'blacklist'
          ? 'Phantom Bay Registered Blacklist Ghost Hunter'
          : fixedText.note;

      card.style.setProperty('--card-bg', theme.cardBg);
      card.style.setProperty('--line', theme.line);
      card.style.setProperty('--soft-line', theme.softLine);
      card.style.setProperty('--muted', theme.muted);
      card.style.setProperty('--accent', theme.accent);
      card.style.setProperty('--text', theme.text);
      card.style.setProperty('--label', theme.label);
      card.style.setProperty('--pill-text', theme.pillText);
      card.style.setProperty('--aff-text', theme.affText);
      card.style.setProperty('--barcode-soft', theme.barcodeSoft);

      card.innerHTML = `
        <div class="ghost-card">
          <div class="top-text">${headquartersDisplay}</div>
          <div class="divider"></div>
          <div class="main-row">
            <div class="photo-box">
              <img id="cardPhoto" src="${escapeHtml(v.photo)}" alt="증명사진">
            </div>
            <div class="info-side">
              <div class="top-info">
                <div class="name-area">
                  <div class="label-small">NAME</div>
                  <div class="name-value">${escapeHtml(v.name || '')}</div>
                </div>
                <div class="hunter-area">
                  <div class="label-small">HUNTER NO.</div>
                  <div class="hunter-pill">${hunterNoDisplay}</div>
                </div>
              </div>
              <div class="aff-row">
                <div class="aff-box">
                  <div class="label-small">AFFILIATION</div>
                  <div class="aff-value">${affiliationDisplay}</div>
                </div>
                <div class="rank-badge">${escapeHtml(v.rank || 'A')}</div>
              </div>
              <div class="valid">${validDisplay}</div>
              <div class="barcode"></div>
            </div>
          </div>
          <div class="bottom-note"><div>${noteDisplay}</div></div>
        </div>
      `;
    }

    Object.entries(fields).forEach(([key, field]) => {
      if (key !== 'photoFile') {
        field.addEventListener('input', render);
        field.addEventListener('change', render);
      }
    });

    fields.photoFile.addEventListener('change', () => {
      const file = fields.photoFile.files && fields.photoFile.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = event => {
        uploadedPhoto = event.target.result;
        toast.textContent = '사진 업로드 완료(@^0^@)';
        render();
      };
      reader.readAsDataURL(file);
    });

    document.querySelector('#resetBtn').addEventListener('click', () => {
      fields.name.value = initialValues.name;
      fields.hunterNo.value = initialValues.hunterNo;
      fields.affiliation.value = initialValues.affiliation;
      fields.rank.value = initialValues.rank;
      fields.theme.value = initialValues.theme;
      fields.photoFile.value = '';
      uploadedPhoto = '';
      toast.textContent = '리셋!!!!';
      render();
    });

    function safeFileName(name) {
      return (name || 'hunter-card')
        .replace(/[\\/:*?"<>|]/g, '')
        .replace(/\s+/g, '_')
        .slice(0, 40) || 'hunter-card';
    }

    function waitForImages(root) {
      const images = Array.from(root.querySelectorAll('img'));
      return Promise.all(images.map(img => {
        if (img.complete && img.naturalWidth > 0) return Promise.resolve();
        return new Promise(resolve => {
          img.onload = resolve;
          img.onerror = resolve;
        });
      }));
    }

    function canvasToBlob(canvas) {
      return new Promise(resolve => {
        canvas.toBlob(blob => resolve(blob), 'image/png');
      });
    }

    saveBtn.addEventListener('click', async () => {
      saveBtn.disabled = true;
      toast.textContent = '(@^0^@)';

      try {
        const target = document.querySelector('#card');
        await waitForImages(target);

        const canvas = await html2canvas(target, {
          backgroundColor: null,
          scale: 3,
          useCORS: true,
          allowTaint: false,
          logging: false
        });

        const blob = await canvasToBlob(canvas);
        if (!blob) throw new Error('이미지 파일을 만들 수 없음');

        const fileName = `${safeFileName(fields.name.value)}_hunter_card.png`;
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');

        link.href = url;
        link.download = fileName;
        link.style.display = 'none';
        document.body.appendChild(link);
        link.click();
        link.remove();

        setTimeout(() => URL.revokeObjectURL(url), 1000);
        toast.textContent = '저장 완료(@^0^@)';
      } catch (error) {
        toast.textContent = '저장 실패（；´д｀）ゞ';
      } finally {
        saveBtn.disabled = false;
      }
    });

    render();
  </script>
</body>
</html>
